version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gastosai_backend
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - gastosai_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/gastosai.db
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gastosai_frontend
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"   # Puerto 80 — acceso sin número de puerto
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gastosai_data:
    driver: local
