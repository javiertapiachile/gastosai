server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Timeouts extendidos para subida de PDFs y clasificación con Ollama
    proxy_connect_timeout 300s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    send_timeout          300s;

    location /api/ {
        proxy_pass http://gastosai_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Sin buffer para ver progreso en tiempo real
        proxy_buffering off;

        # Timeouts para requests largos (clasificación PDF con Ollama)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Soporte para archivos grandes
        client_max_body_size 55M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
