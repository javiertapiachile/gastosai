server {
    listen 80;
    server_name _;  # Acepta cualquier hostname o IP
    root /usr/share/nginx/html;
    index index.html;

    # Proxy del API al backend — usa nombre de servicio Docker interno
    # Esto funciona tanto desde localhost como desde la red local
    location /api/ {
        proxy_pass http://gastosai_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # Timeout largo para clasificaciones con Ollama
    }

    # SPA routing — todas las rutas van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
